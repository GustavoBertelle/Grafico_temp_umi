<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementando o chartJS</title>
</head>

<body style="display: flex; gap: 50px;">

<div>
  <canvas id="myChart1"></canvas>
</div>

<div>
  <canvas id="myChart2"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels1 = ['12:00','13:00','14:00','15:00','16:00','17:00'];

const data1 = {
  labels: labels1,
  datasets: [
    {
      label: 'Temperatura',
      borderColor: 'red',
      backgroundColor: 'red',
      data: [30,29,28,25,22,23],
    },
    {
      label: 'Umidade',
      borderColor: 'blue',
      backgroundColor: 'blue',
      data: [80,82,80,85,80,83],
    }
  ]
};

const config1 = {
  type: 'line',
  data: data1
};


const labels2 = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho'];

const data2 = {
  labels: labels2,
  datasets: [
    {
      label: 'Temperatura Média',
      backgroundColor: 'red',
      data: [22,24,27,23,20,18],
    },
    {
      label: 'Umidade Média',
      backgroundColor: 'blue',
      data: [90,89,93,87,88,82],
    }
  ]
};

const config2 = {
  type: 'bar',
  data: data2
};


new Chart(document.getElementById('myChart1'), config1);
new Chart(document.getElementById('myChart2'), config2);

</script>

</body>
</html>
